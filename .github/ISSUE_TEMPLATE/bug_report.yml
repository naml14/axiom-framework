name: Bug Report
description: Something is not working as expected
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in as much detail as possible — especially the **reproduction steps** and **environment**.

  - type: input
    id: version
    attributes:
      label: axiom-framework version
      description: Run `bun pm ls` or check your package.json
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Bun
        - Node.js
        - Browser (Vite)
        - Browser (webpack)
        - Browser (esbuild)
        - Other
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      placeholder: "Bun 1.3.11 / Node 20.11.0 / Chrome 124"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        A minimal code snippet that reproduces the issue.
        The smaller, the better — ideally a single component + signal.
      render: typescript
      placeholder: |
        import { signal, defineComponent, createApp } from 'axiom-framework'

        const count = signal(0)
        const App = defineComponent(() => ({
          type: 'element' as const,
          tag: 'div',
          children: [{ type: 'text' as const, content: String(count.value) }]
        }))

        const app = createApp(App, document.getElementById('app')!)
        app.mount()
        // Bug: ...
    validations:
      required: true

  - type: textarea
    id: phase
    attributes:
      label: Which phase is affected?
      description: If you know which part of the pipeline is involved, it helps a lot.
      placeholder: |
        - [ ] signals (signal, computed, effect)
        - [ ] prepare()
        - [ ] reflow()
        - [ ] commit()
        - [ ] diff (fastDiff / fullDiff)
        - [ ] scheduler
        - [ ] createApp / mount / unmount
        - [ ] TypeScript types / exports
        - [ ] Unknown

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Error messages, stack traces, screenshots, anything else helpful.
