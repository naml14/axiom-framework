name: Manual Publish

# Fallback workflow for publishing to npm when the automated
# release-please publish job fails (e.g. auth misconfiguration).
# Trigger from: Actions → Manual Publish → Run workflow
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: bun install

      # prepublishOnly script runs: typecheck → tests → build
      - name: Publish to npm
        run: bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
