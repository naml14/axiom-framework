# openspec/config.yaml — Axiom Framework SDD Configuration
project: axiom-framework
artifact_store: hybrid
strict_tdd: true

testing:
  runner: bun
  command: bun test
  typecheck: bun run typecheck
  # OpenSpec verification uses 0 (no gate) — CI gating is enforced separately
  # via `scripts/validate-coverage.ts` which requires 85%.
  coverage_threshold: 0

rules:
  apply:
    - match_existing_code_patterns
    - no_freelancing_from_design
